apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  labels:
    app: clickhouse
spec:
  selector:
    app: clickhouse
  ports:
    - name: http
      port: {{ .Values.service.httpPort }}
      targetPort: 8123

    - name: native
      port: {{ .Values.service.nativePort }}
      targetPort: 9000

  type: ClusterIP