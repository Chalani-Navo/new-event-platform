services:
  postgres:
    image: postgres:16-alpine
    container_name: new-event-postgres
    environment:
      POSTGRES_DB: eventdb
      POSTGRES_USER: eventuser
      POSTGRES_PASSWORD: eventpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U eventuser -d eventdb
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  event-service:
    build:
      context: ./services/event-service
    container_name: event-service
    environment:
      DATABASE_URL: postgresql://eventuser:eventpassword@postgres:5432/eventdb
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  program-service:
    build:
      context: ./services/program-service
    container_name: program-service
    environment:
      DATABASE_URL: postgresql://eventuser:eventpassword@postgres:5432/eventdb
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  registration-service:
    build:
      context: ./services/registration-service
    container_name: registration-service
    environment:
      DATABASE_URL: postgresql://eventuser:eventpassword@postgres:5432/eventdb
      EVENT_SERVICE_URL: http://event-service:5000
    ports:
      - "5002:5002"
    depends_on:
      postgres:
        condition: service_healthy
      event-service:
        condition: service_started
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse
    environment:
      CLICKHOUSE_DB: new_event_analytics
      CLICKHOUSE_USER: analytics_user
      CLICKHOUSE_PASSWORD: analytics_password
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test:
        - CMD
        - wget
        - --spider
        - -q
        - http://localhost:8123/ping
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  analytics-service:
    build:
      context: ./services/analytics-service
    container_name: analytics-service
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_DATABASE: new_event_analytics
      CLICKHOUSE_USER: analytics_user
      CLICKHOUSE_PASSWORD: analytics_password
    ports:
      - "5003:5003"
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: new-event-frontend
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  postgres-data:
  clickhouse-data: