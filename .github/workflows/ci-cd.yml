name: Build and Deploy to EKS

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-1
  ECR_REGISTRY: 790304250595.dkr.ecr.ap-southeast-1.amazonaws.com

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show GitHub OIDC claims
        shell: bash
        run: |
          TOKEN_RESPONSE=$(curl -sS \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com")

          ID_TOKEN=$(echo "$TOKEN_RESPONSE" | python3 -c \
            "import sys, json; print(json.load(sys.stdin)['value'])")

          export ID_TOKEN

          python3 - <<'PY'
          import os
          import json
          import base64

          token = os.environ["ID_TOKEN"]

          payload = token.split(".")[1]
          payload += "=" * (-len(payload) % 4)

          claims = json.loads(
              base64.urlsafe_b64decode(payload).decode("utf-8")
          )

          print("aud =", claims.get("aud"))
          print("sub =", claims.get("sub"))
          print("repository =", claims.get("repository"))
          print("ref =", claims.get("ref"))
          PY

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::790304250595:role/new-event-github-actions-role
          role-session-name: new-event-github-actions
          aws-region: ap-southeast-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Event Service
        run: |
          docker build \
            -t $ECR_REGISTRY/event-service:latest \
            ./services/event-service

          docker push \
            $ECR_REGISTRY/event-service:latest

      - name: Build Program Service
        run: |
          docker build \
            -t $ECR_REGISTRY/program-service:latest \
            ./services/program-service

          docker push \
            $ECR_REGISTRY/program-service:latest

      - name: Build Registration Service
        run: |
          docker build \
            -t $ECR_REGISTRY/registration-service:latest \
            ./services/registration-service

          docker push \
            $ECR_REGISTRY/registration-service:latest

      - name: Build Analytics Service
        run: |
          docker build \
            -t $ECR_REGISTRY/analytics-service:latest \
            ./services/analytics-service

          docker push \
            $ECR_REGISTRY/analytics-service:latest

      - name: Build Frontend
        run: |
          docker build \
            -t $ECR_REGISTRY/frontend:latest \
            ./frontend

          docker push \
            $ECR_REGISTRY/frontend:latest

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --name new-event-cluster \
            --region $AWS_REGION

      - name: Restart Deployments
        run: |
          kubectl rollout restart deployment/frontend \
            -n new-event

          kubectl rollout restart deployment/event-service \
            -n new-event

          kubectl rollout restart deployment/program-service \
            -n new-event

          kubectl rollout restart deployment/registration-service \
            -n new-event

          kubectl rollout restart deployment/analytics-service \
            -n new-event

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/frontend \
            -n new-event \
            --timeout=300s

          kubectl rollout status deployment/event-service \
            -n new-event \
            --timeout=300s

          kubectl rollout status deployment/program-service \
            -n new-event \
            --timeout=300s

          kubectl rollout status deployment/registration-service \
            -n new-event \
            --timeout=300s

          kubectl rollout status deployment/analytics-service \
            -n new-event \
            --timeout=300s