apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: new-event
spec:
  replicas: 2
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      containers:
        - name: analytics-service
          image: 790304250595.dkr.ecr.ap-southeast-1.amazonaws.com/analytics-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5003
          env:
            - name: CLICKHOUSE_HOST
              valueFrom:
                configMapKeyRef:
                  name: new-event-config
                  key: CLICKHOUSE_HOST
            - name: CLICKHOUSE_PORT
              valueFrom:
                configMapKeyRef:
                  name: new-event-config
                  key: CLICKHOUSE_PORT
            - name: CLICKHOUSE_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: new-event-config
                  key: CLICKHOUSE_DATABASE
            - name: CLICKHOUSE_USER
              valueFrom:
                secretKeyRef:
                  name: new-event-secrets
                  key: CLICKHOUSE_USER
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: new-event-secrets
                  key: CLICKHOUSE_PASSWORD
          readinessProbe:
            httpGet:
              path: /ready
              port: 5003
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5003
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: new-event
spec:
  selector:
    app: analytics-service
  ports:
    - name: http
      port: 5003
      targetPort: 5003
  type: ClusterIP
