apiVersion: v1
kind: ServiceAccount
metadata:
  name: event-service-sa
  namespace: new-event

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-service
  namespace: new-event
spec:
  replicas: 2
  selector:
    matchLabels:
      app: event-service
  template:
    metadata:
      labels:
        app: event-service
    spec:
      serviceAccountName: event-service-sa

      containers:
        - name: event-service
          image: 790304250595.dkr.ecr.ap-southeast-1.amazonaws.com/event-service:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 5000

          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: new-event-secrets
                  key: DATABASE_URL

            - name: AWS_REGION
              value: "ap-southeast-1"

            - name: LAMBDA_FUNCTION_NAME
              value: "new-event-low-seat-alert"

          readinessProbe:
            httpGet:
              path: /ready
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 20

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: event-service
  namespace: new-event
spec:
  selector:
    app: event-service
  ports:
    - name: http
      port: 5000
      targetPort: 5000
  type: ClusterIP