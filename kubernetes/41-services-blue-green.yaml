# =========================================================
# EVENT SERVICE - BLUE
# =========================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-service-blue
  namespace: new-event
  labels:
    app: event-service
    slot: blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: event-service
      slot: blue
  template:
    metadata:
      labels:
        app: event-service
        slot: blue
    spec:
      serviceAccountName: event-service-sa
      containers:
        - name: event-service
          image: 790304250595.dkr.ecr.ap-southeast-1.amazonaws.com/event-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000

          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: new-event-secrets
                  key: DATABASE_URL

            - name: LOW_SEAT_LAMBDA_NAME
              value: new-event-low-seat-alert

            - name: AWS_REGION
              value: ap-southeast-1

          readinessProbe:
            httpGet:
              path: /ready
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6

          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

---
